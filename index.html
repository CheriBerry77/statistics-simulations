```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sampling Bias Simulator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f7fa;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,.1);
}

h1 {
    text-align: center;
}

.controls {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 15px;
    margin-bottom: 20px;
}

button {
    padding: 10px;
    cursor: pointer;
}

.resultBox {
    background: #eef5ff;
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
}

.barContainer {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.barSection {
    flex: 1;
}

.bar {
    height: 35px;
    background: steelblue;
    color: white;
    text-align: center;
    line-height: 35px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>Sampling Bias Simulator</h1>

<p>
Explore how different sampling methods affect the accuracy of survey results.
</p>

<div class="controls">

<div>
<label>Population Support Rate (%)</label>
<input type="number" id="supportRate" value="60" min="1" max="99">
</div>

<div>
<label>Sample Size</label>
<input type="number" id="sampleSize" value="100" min="10" max="1000">
</div>

<div>
<label>Sampling Method</label>
<select id="samplingMethod">
<option value="srs">Simple Random Sample</option>
<option value="convenience">Convenience Sample</option>
<option value="voluntary">Voluntary Response</option>
<option value="stratified">Stratified Sample</option>
<option value="cluster">Cluster Sample</option>
</select>
</div>

</div>

<button onclick="runSimulation()">Draw Sample</button>

<div id="results" class="resultBox">
Generate a sample to begin.
</div>

<div class="barContainer">

<div class="barSection">
<h3>Population</h3>
<div id="populationBar" class="bar" style="width:0%">
0%
</div>
</div>

<div class="barSection">
<h3>Sample</h3>
<div id="sampleBar" class="bar" style="width:0%">
0%
</div>
</div>

</div>

</div>

<script>

let population = [];

function generatePopulation() {

    population = [];

    const supportRate =
        Number(document.getElementById("supportRate").value) / 100;

    for(let i=0;i<10000;i++) {

        population.push({
            support: Math.random() < supportRate,
            group: Math.random() < .5 ? "A" : "B"
        });
    }
}

function sampleSRS(size){

    const copy = [...population];

    copy.sort(()=>Math.random()-0.5);

    return copy.slice(0,size);
}

function sampleConvenience(size){

    return population.slice(0,size);
}

function sampleVoluntary(size){

    const volunteers = population.filter(person=>{

        if(person.support)
            return Math.random() < 0.8;

        return Math.random() < 0.2;
    });

    volunteers.sort(()=>Math.random()-0.5);

    return volunteers.slice(0,size);
}

function sampleStratified(size){

    const groupA =
        population.filter(p=>p.group==="A");

    const groupB =
        population.filter(p=>p.group==="B");

    const half = Math.floor(size/2);

    groupA.sort(()=>Math.random()-0.5);
    groupB.sort(()=>Math.random()-0.5);

    return [
        ...groupA.slice(0,half),
        ...groupB.slice(0,size-half)
    ];
}

function sampleCluster(size){

    const clusterA =
        population.filter(p=>p.group==="A");

    clusterA.sort(()=>Math.random()-0.5);

    return clusterA.slice(0,size);
}

function runSimulation(){

    generatePopulation();

    const size =
        Number(document.getElementById("sampleSize").value);

    const method =
        document.getElementById("samplingMethod").value;

    let sample;

    switch(method){

        case "srs":
            sample = sampleSRS(size);
            break;

        case "convenience":
            sample = sampleConvenience(size);
            break;

        case "voluntary":
            sample = sampleVoluntary(size);
            break;

        case "stratified":
            sample = sampleStratified(size);
            break;

        case "cluster":
            sample = sampleCluster(size);
            break;
    }

    const populationRate =
        population.filter(p=>p.support).length /
        population.length;

    const sampleRate =
        sample.filter(p=>p.support).length /
        sample.length;

    const error =
        Math.abs(populationRate - sampleRate);

    let explanation = "";

    switch(method){

        case "srs":
            explanation =
            "Simple Random Sampling minimizes bias and usually produces estimates close to the population parameter.";
            break;

        case "convenience":
            explanation =
            "Convenience samples may not represent the whole population because only easily accessible individuals are selected.";
            break;

        case "voluntary":
            explanation =
            "Voluntary response samples often overrepresent people with strong opinions.";
            break;

        case "stratified":
            explanation =
            "Stratified sampling can improve accuracy by ensuring important groups are represented.";
            break;

        case "cluster":
            explanation =
            "Cluster sampling may be biased if the chosen cluster differs from the population.";
            break;
    }

    document.getElementById("results").innerHTML =
    `
    <h2>Results</h2>

    <p><strong>Population Proportion:</strong>
    ${(populationRate*100).toFixed(2)}%</p>

    <p><strong>Sample Proportion:</strong>
    ${(sampleRate*100).toFixed(2)}%</p>

    <p><strong>Sampling Error:</strong>
    ${(error*100).toFixed(2)}%</p>

    <p>${explanation}</p>
    `;

    const popBar =
        document.getElementById("populationBar");

    popBar.style.width =
        `${populationRate*100}%`;

    popBar.textContent =
        `${(populationRate*100).toFixed(1)}%`;

    const sampleBar =
        document.getElementById("sampleBar");

    sampleBar.style.width =
        `${sampleRate*100}%`;

    sampleBar.textContent =
        `${(sampleRate*100).toFixed(1)}%`;
}

</script>

</body>
</html>
```
